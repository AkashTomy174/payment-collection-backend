name: Backend CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          REPO_URL: ${{ secrets.BACKEND_REPO_URL }}
          BRANCH: main
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          PORT: ${{ secrets.PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_DIR,REPO_URL,BRANCH,DATABASE_URL,JWT_SECRET,CORS_ORIGIN,PORT
          script: |
            set -euo pipefail
            : "${APP_DIR:=/var/www/payment-backend}"
            : "${PORT:=3000}"
            : "${CORS_ORIGIN:=*}"

            if [ -z "${REPO_URL:-}" ]; then
              echo "BACKEND_REPO_URL secret is required"
              exit 1
            fi

            if [ -z "${DATABASE_URL:-}" ] || [ -z "${JWT_SECRET:-}" ]; then
              echo "DATABASE_URL and JWT_SECRET secrets are required"
              exit 1
            fi

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            if ! command -v psql >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y postgresql-client
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown "$USER":"$USER" "$APP_DIR"
              cd "$APP_DIR"
              git init
              git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
            else
              cd "$APP_DIR"
            fi

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            {
              printf 'PORT=%s\n' "$PORT"
              printf 'NODE_ENV=production\n'
              printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
              printf 'USE_MEMORY_DB=false\n'
              printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
              printf 'CORS_ORIGIN=%s\n' "$CORS_ORIGIN"
            } > .env
            chmod 600 .env

            npm ci
            npm run build
            set -a
            . ./.env
            set +a
            npm run migrate
            npm run seed
            npm prune --omit=dev
            pm2 reload ecosystem.config.cjs --env production --update-env || pm2 start ecosystem.config.cjs --env production
            pm2 save
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error "http://127.0.0.1:$PORT/health"; then
                exit 0
              fi
              sleep 2
            done
            exit 1
